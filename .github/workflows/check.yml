name: esgf-core-utils-check

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Clear coverage
        run: |
          uv install --with test
          uv run python -m coverage erase
      - name: Run tests
        run: |
          uv run python -m coverage erase
          uv run python -m coverage run -m unittest discover
      - name: Check coverage
        run: |
          uv run python -m coverage report

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          uv env use 3.12
      - name: Check UV
        run: |
          uv locl --check
      - name: Run black
        run: |
          uv install --only black
          uv run black ./ --verbose --check
      - name: Run bandit
        run: |
          uv install --only bandit
          uv run bandit -c pyproject.toml -r .
      - name: Run isort
        run: |
          uv install --only isort
          uv run isort . --check
      - name: Run ruff
        run: |
          uv install --only ruff
          uv run ruff check
      # - name: Run audit
      #   run: |
      #     pipx inject uv uv-audit-plugin
      #     uv audit $(uv run python -c "import tomllib; f = open('pyproject.toml','rb') ; data =  tomllib.load(f); f.close(); ignore_codes = data['tool']['quality']['audit']['ignore-code']; print('--ignore-code=' + ','.join(ignore_codes)) if ignore_codes else print('')")
      - name: Run xenon
        run: |
          uv install --only xenon
          uv run xenon -a $(uv run python -c "import tomllib; f = open('pyproject.toml','rb') ; data =  tomllib.load(f); f.close(); print(data['tool']['quality']['mccabe']['average'])") -b $(uv run python -c "import tomllib; f = open('pyproject.toml','rb') ; data =  tomllib.load(f); f.close(); print(data['tool']['quality']['mccabe']['block'])") -m $(uv run python -c "import tomllib; f = open('pyproject.toml','rb') ; data =  tomllib.load(f); f.close(); print(data['tool']['quality']['mccabe']['module'])") .
      - name: Run mypy
        run: |
          uv install --with mypy
          uv run mypy .
      - name: Run sphinx
        run: |
          uv install --with docs
          uv run sphinx-build -M dummy ./docs ./docs/_build -W -a
